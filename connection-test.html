<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .status { padding: 20px; margin: 10px 0; border-radius: 8px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .info { background: #d1ecf1; color: #0c5460; border: 2px solid #17a2b8; }
        pre { background: white; padding: 15px; border-radius: 5px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 14px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🔌 Frontend ↔️ Backend Connection Test</h1>
    
    <div id="status"></div>
    
    <button onclick="testConnection()">🔄 Test Connection</button>
    <button onclick="testRoute()">🗺️ Test Route (Delhi → Mumbai)</button>
    
    <h3>Response Data:</h3>
    <pre id="response">Click a button to test...</pre>

    <script>
        const BACKEND_URL = 'http://localhost:8080';
        const statusDiv = document.getElementById('status');
        const responseDiv = document.getElementById('response');

        async function testConnection() {
            statusDiv.innerHTML = '<div class="info">⏳ Testing server connection...</div>';
            responseDiv.textContent = 'Loading...';
            
            try {
                const response = await fetch(BACKEND_URL);
                const data = await response.json();
                
                statusDiv.innerHTML = `
                    <div class="success">✅ CONNECTION SUCCESSFUL!</div>
                    <div class="success">Server is running on port 8080</div>
                    <div class="success">CORS headers: ${response.headers.get('access-control-allow-origin')}</div>
                `;
                
                responseDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">❌ CONNECTION FAILED!</div>
                    <div class="error">Error: ${error.message}</div>
                    <div class="error">Make sure Java server is running: java RouteServer</div>
                `;
                responseDiv.textContent = error.toString();
            }
        }

        async function testRoute() {
            statusDiv.innerHTML = '<div class="info">⏳ Calculating route Delhi → Mumbai...</div>';
            responseDiv.textContent = 'Loading...';
            
            try {
                const url = `${BACKEND_URL}/route?source=28.6139,77.2090&destination=19.0760,72.8777`;
                console.log('Request URL:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.status === 'success') {
                    statusDiv.innerHTML = `
                        <div class="success">✅ ROUTE CALCULATED SUCCESSFULLY!</div>
                        <div class="success">Distance: ${data.distance.toFixed(1)} km</div>
                        <div class="success">Duration: ${data.duration.toFixed(0)} minutes</div>
                        <div class="success">Path waypoints: ${data.path.length}</div>
                        <div class="info">💡 Frontend can communicate with backend!</div>
                    `;
                    
                    if (data.path.length === 2) {
                        statusDiv.innerHTML += `
                            <div class="info">ℹ️ Path has only 2 points (start & end)</div>
                            <div class="info">Frontend will auto-create 20 intermediate points for smooth animation</div>
                        `;
                    }
                } else {
                    statusDiv.innerHTML = `<div class="error">❌ Route calculation failed: ${data.message}</div>`;
                }
                
                responseDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">❌ REQUEST FAILED!</div>
                    <div class="error">Error: ${error.message}</div>
                `;
                responseDiv.textContent = error.toString();
            }
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
